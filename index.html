<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Contact Logs</title>
<link rel="icon" href="https://img.logo.dev/alvarezandmarsal.com?token=pk_bYWEonUXSpa1_O-4n_OaKQ&format=png&size=64">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#EEF2F5;color:#1A2E38;font-size:14px;min-height:100vh;display:flex;flex-direction:column}
:root{--deep:#1C2B33;--border:rgba(28,43,51,.07);--muted:#8A9FAB}

header{background:var(--deep);height:62px;padding:0 40px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(28,43,51,.1)}
.logo-text h1{color:#fff;font-size:16px;font-weight:600;letter-spacing:-.01em}
.live-badge{display:flex;align-items:center;gap:6px;color:#4DD9AC;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.14em}
.live-dot{width:5px;height:5px;border-radius:50%;background:#4DD9AC;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

main{flex:1;padding:40px 40px 56px}

.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.sec-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

/* Card is NOT a link, just a container */
.card{
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(12px);
  border-radius:14px;
  display:flex;
  flex-direction:column;
  animation:fadeUp .35s ease both;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.8);
  box-shadow:0 2px 8px rgba(28,43,51,.04);
}

.card-bar{position:absolute;top:0;left:0;right:0;height:6px}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.04s}
.card:nth-child(2){animation-delay:.09s}
.card:nth-child(3){animation-delay:.14s}

.card-body{padding:24px 24px 20px;display:flex;flex-direction:column;gap:18px;flex:1}
.card-title{font-size:17px;font-weight:700;color:#1A2E38;letter-spacing:-.02em;line-height:1.2}

.card-footer{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid var(--border)}

.active-status{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.02em}
.active-dot{width:6px;height:6px;border-radius:50%;background:#00C9A0;flex-shrink:0}

/* Open button — only clickable element, filled by default, transparent on hover */
.open-btn{
  font-size:10px;
  font-weight:600;
  padding:6px 16px;
  border-radius:999px;
  display:inline-flex;
  align-items:center;
  gap:5px;
  letter-spacing:.03em;
  text-decoration:none;
  color:#fff;
  border:1.5px solid transparent;
  transition:background .18s, color .18s, border-color .18s;
  cursor:pointer;
}
.open-btn:hover{
  background:transparent !important;
}

footer{padding:18px 40px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.footer-txt{font-size:10px;color:var(--muted);letter-spacing:.05em}

@media(max-width:600px){
  header{padding:0 20px}
  main{padding:24px 20px 40px}
  .grid{grid-template-columns:1fr}
  footer{padding:16px 20px;flex-direction:column;gap:4px}
}
</style>
</head>
<body>

<header>
  <div class="logo-text"><h1>My Contact Logs</h1></div>
  <div class="live-badge"><span class="live-dot"></span>Live</div>
</header>

<main>
  <div class="sec-head">
    <div class="sec-lbl">Active Projects</div>
    <div class="sec-line"></div>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <div class="footer-txt">claralamotte.github.io/contactlog</div>
  <div class="footer-txt">Sports, Leisure & Entertainment</div>
</footer>

<script>
var TK = 'pk_bYWEonUXSpa1_O-4n_OaKQ';

var PROJECTS = [
  {
    label: 'Project EDELWEISS',
    href: './edelweiss/',
    sheetId: '19bVqO2NN-ookcj1ePtCJEKnLzobjHWGb77yM-h0ee24',
    gid: '1522593400',
    fallback: '#0085CA'
  },
  {
    label: 'Project GEG',
    href: './geg/',
    sheetId: '1aWMNinhiyPV5oQNgSujcrTuoH2FRHcxrVSOQ8w7GAls',
    gid: '1522593400',
    fallback: '#E8A838'
  }
];

function buildCard(p, idx, color) {
  var c = color || p.fallback;
  var r = hexRgb(c);
  var hoverBg = 'rgba('+r+',.15)';
  return '<div class="card" id="card-'+idx+'">'
    + '<div class="card-bar" style="background:'+c+'"></div>'
    + '<div class="card-body">'
    +   '<div class="card-title">'+p.label+'</div>'
    +   '<div class="card-footer">'
    +     '<div class="active-status"><div class="active-dot"></div>Active</div>'
    +     '<a class="open-btn" href="'+p.href+'" style="background:'+c+';border-color:'+c+'" '
    +       'onmouseenter="this.style.background=\''+hoverBg+'\';this.style.color=\''+c+'\'" '
    +       'onmouseleave="this.style.background=\''+c+'\';this.style.color=\'#fff\'">Open →</a>'
    +   '</div>'
    + '</div>'
    + '</div>';
}

var grid = document.getElementById('grid');
var html = '';
PROJECTS.forEach(function(p, idx) { html += buildCard(p, idx, p.fallback); });
grid.innerHTML = html;

function fetchDomain(sheetId, gid) {
  return new Promise(function(resolve) {
    fetch('https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?tqx=out:csv&gid='+gid+'&range=B8')
      .then(function(r){ return r.text(); })
      .then(function(t){ resolve(t.replace(/^"|"$/g,'').trim() || null); })
      .catch(function(){ resolve(null); });
  });
}

var cvs = document.createElement('canvas');
cvs.width = 80; cvs.height = 80;
var ctx = cvs.getContext('2d');

function extractColor(imgUrl) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function() {
      try {
        ctx.clearRect(0,0,80,80);
        ctx.drawImage(img,0,0,80,80);
        var data = ctx.getImageData(0,0,80,80).data;
        var buckets = {};
        for(var i=0;i<data.length;i+=4){
          var rv=data[i],g=data[i+1],b=data[i+2],a=data[i+3];
          if(a<100)continue;
          var lum=(rv*299+g*587+b*114)/1000;
          if(lum>220||lum<25)continue;
          var qr=Math.round(rv/24)*24,qg=Math.round(g/24)*24,qb=Math.round(b/24)*24;
          var key=qr+','+qg+','+qb;
          buckets[key]=(buckets[key]||0)+1;
        }
        var best=null,bestN=0;
        for(var k in buckets){if(buckets[k]>bestN){bestN=buckets[k];best=k;}}
        if(best){
          var pts=best.split(',');
          resolve('#'+('0'+parseInt(pts[0]).toString(16)).slice(-2)+('0'+parseInt(pts[1]).toString(16)).slice(-2)+('0'+parseInt(pts[2]).toString(16)).slice(-2));
        } else resolve(null);
      } catch(e){ resolve(null); }
    };
    img.onerror=function(){ resolve(null); };
    img.src=imgUrl;
  });
}

PROJECTS.forEach(function(p, idx) {
  fetchDomain(p.sheetId, p.gid).then(function(domain) {
    if(!domain) return;
    extractColor('https://img.logo.dev/'+domain+'?token='+TK+'&format=png&size=80').then(function(color) {
      if(!color) return;
      var el = document.getElementById('card-'+idx);
      if(!el) return;
      var tmp = document.createElement('div');
      tmp.innerHTML = buildCard(p, idx, color);
      el.parentNode.replaceChild(tmp.firstChild, el);
    });
  });
});
</script>
</body>
</html>
