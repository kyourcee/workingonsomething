<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Contact Logs</title>
<link rel="icon" href="https://img.logo.dev/alvarezandmarsal.com?token=pk_bYWEonUXSpa1_O-4n_OaKQ&format=png&size=64">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#EEF2F5;color:#1A2E38;font-size:14px;min-height:100vh;display:flex;flex-direction:column}
:root{--deep:#1C2B33;--border:rgba(28,43,51,.07);--muted:#8A9FAB}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
main{flex:1;padding:40px 40px 56px;padding-top:48px}
.sec-head{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.sec-lbl{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:var(--muted);white-space:nowrap}
.sec-line{flex:1;height:1px;background:var(--border)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px}
.card{background:rgba(255,255,255,.6);backdrop-filter:blur(12px);border-radius:14px;display:flex;flex-direction:column;animation:fadeUp .35s ease both;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.8);box-shadow:0 2px 8px rgba(28,43,51,.04)}
.card-bar{position:absolute;top:0;left:0;right:0;height:6px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.04s}.card:nth-child(2){animation-delay:.09s}.card:nth-child(3){animation-delay:.14s}
.card-body{padding:32px 32px 26px;display:flex;flex-direction:column;gap:22px;flex:1}

.card-title{font-size:17px;font-weight:700;letter-spacing:-.02em;line-height:1.2;color:#1C2B33 !important}


.card-footer{display:flex;align-items:center;justify-content:space-between}
.active-status{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);font-weight:500}
.active-dot{width:6px;height:6px;border-radius:50%;background:#4DD9AC;flex-shrink:0;animation:pulse 2s infinite}
.open-btn{font-size:10px;font-weight:600;padding:6px 16px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;letter-spacing:.03em;text-decoration:none;color:#fff;border:1.5px solid transparent;transition:background .18s,color .18s;cursor:pointer}
footer{padding:18px 40px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.footer-txt{font-size:10px;color:var(--muted);letter-spacing:.05em}
</style>
</head>
<body>
<main>
  <div class="sec-head">
    <div class="sec-lbl">Active Projects</div>
    <div class="sec-line"></div>
  </div>
  <div class="grid" id="grid"></div>
</main>
<footer>
  <div class="footer-txt">claralamotte.github.io/contactlog</div>
  <div class="footer-txt">Sports, Leisure &amp; Entertainment</div>
</footer>
<script>
var TK = 'pk_bYWEonUXSpa1_O-4n_OaKQ';

// -------------------------------------------------------
// AJOUTE TES PROJETS ICI — copie une ligne et remplis :
// label   : nom affiché
// href    : chemin vers le dossier du projet
// fallback: couleur de la barre en haut
// -------------------------------------------------------
var PROJECTS = [
  { label:'Project EDELWEISS', href:'./edelweiss/', domain:'cross-pharm.ch', fallback:'#0085CA' },
  { label:'Project GEG',       href:'./geg/',       domain:'geg.asia', fallback:'#E8A838' }
];

function hexRgb(h){h=h.replace('#','');return parseInt(h.substring(0,2),16)+','+parseInt(h.substring(2,4),16)+','+parseInt(h.substring(4,6),16)}

function buildCard(p, idx) {
  var c = p.fallback;
  var r = hexRgb(c);
  var hoverBg = 'rgba('+r+',.15)';

  return '<div class="card" id="card-'+idx+'">'
    +'<div class="card-bar" style="background:'+c+'"></div>'
    +'<div class="card-body">'
    +'<div class="card-title">'+p.label+'</div>'
    +'<div class="card-footer">'
    +'<div class="active-status"><div class="active-dot"></div>Active</div>'
    +'<a class="open-btn" href="'+p.href+'" style="background:'+c+';border-color:'+c+'" '
    +'onmouseenter="this.style.background=\''+hoverBg+'\';this.style.color=\''+c+'\'" '
    +'onmouseleave="this.style.background=\''+c+'\';this.style.color=\'#fff\'">Open &rarr;</a>'
    +'</div>'
    +'</div>'
    +'</div>';
}

var grid = document.getElementById('grid');
PROJECTS.forEach(function(p, idx) { grid.innerHTML += buildCard(p, idx); });
</script>
</body>
</html>
